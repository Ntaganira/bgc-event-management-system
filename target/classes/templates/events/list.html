<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head><title>Events</title></head>
<body>
<div th:replace="~{fragments/layout :: layout(~{::section#content}, #{event.title})}">
<section id="content">
<div class="content">
  <div class="page-header">
    <h2 th:text="#{event.title}">Events</h2>
    <div class="page-actions">
      <a th:href="@{/events/calendar}" class="btn btn-outline" th:text="#{event.calendar}">Calendar</a>
      <a th:href="@{/events/new}"      class="btn btn-primary"
         sec:authorize="hasAuthority('CREATE_EVENT')">+ <span th:text="#{event.new}">New</span></a>
    </div>
  </div>
  <div th:if="${successMsg}" class="alert alert-success" th:text="${successMsg}"></div>
  <div th:if="${errorMsg}"   class="alert alert-danger"  th:text="${errorMsg}"></div>
  <div class="card">
    <div th:if="${#lists.isEmpty(events)}" class="empty-state" th:text="#{event.none}">No events.</div>
    <table class="table" th:if="${not #lists.isEmpty(events)}">
      <thead><tr>
        <th th:text="#{event.title}">Title</th>
        <th th:text="#{event.location}">Location</th>
        <th th:text="#{event.startDate}">Start</th>
        <th th:text="#{event.endDate}">End</th>
        <th th:text="#{attendance.title}">Attendance</th>
        <th th:text="#{common.actions}">Actions</th>
      </tr></thead>
      <tbody>
        <tr th:each="event : ${events}">
          <td th:text="${event.title}">Title</td>
          <td th:text="${event.location ?: '—'}">Location</td>
          <td th:text="${#temporals.format(event.startDateTime,'dd MMM yyyy HH:mm')}">Start</td>
          <td th:text="${#temporals.format(event.endDateTime,'dd MMM yyyy HH:mm')}">End</td>
          <td th:text="${event.attendanceRecords.size()}">0</td>
          <td class="action-btns">
            <a th:href="@{/events/{id}(id=${event.id})}"
               class="btn btn-sm btn-outline" th:text="#{event.view}">View</a>
            <a th:href="@{/events/{id}/edit(id=${event.id})}"
               class="btn btn-sm btn-outline"
               sec:authorize="hasAuthority('EDIT_EVENT')" th:text="#{common.edit}">Edit</a>
            <form th:action="@{/events/{id}/delete(id=${event.id})}" method="post" style="display:inline"
                  th:onsubmit="'return confirm(\'' + #{event.confirmDelete} + '\')'">
              <button type="submit" class="btn btn-sm btn-danger"
                      sec:authorize="hasAuthority('DELETE_EVENT')" th:text="#{event.delete}">Del</button>
            </form>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
</section>
</div>
</body>
</html>
