<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head><title>Event Form</title></head>
<body>
<div th:replace="~{fragments/layout :: layout(~{::section#content}, #{event.new})}">
<section id="content">
<div class="content">
  <div class="page-header">
    <h2 th:text="${eventDto.id != null} ? #{event.edit} : #{event.new}">Event</h2>
    <a th:href="@{/events}" class="btn btn-outline">← <span th:text="#{common.back}">Back</span></a>
  </div>
  <div class="card" style="max-width:640px;">
    <form th:action="${eventDto.id != null} ? @{/events/{id}/edit(id=${eventDto.id})} : @{/events/new}"
          th:object="${eventDto}" method="post" class="auth-form">
      <div class="form-group">
        <label th:text="#{event.title}">Title</label>
        <input type="text" th:field="*{title}" class="form-control" required>
        <span class="field-error" th:errors="*{title}"></span>
      </div>
      <div class="form-group">
        <label th:text="#{event.description}">Description</label>
        <textarea th:field="*{description}" class="form-control" rows="3"></textarea>
      </div>
      <div class="form-group">
        <label th:text="#{event.location}">Location</label>
        <input type="text" th:field="*{location}" class="form-control">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label th:text="#{event.startDate}">Start</label>
          <input type="datetime-local" th:field="*{startDateTime}" class="form-control" required>
        </div>
        <div class="form-group">
          <label th:text="#{event.endDate}">End</label>
          <input type="datetime-local" th:field="*{endDateTime}" class="form-control" required>
        </div>
      </div>
      <div class="form-actions">
        <button type="submit" class="btn btn-primary"
                th:text="${eventDto.id != null} ? #{event.update} : #{event.create}">Save</button>
        <a th:href="@{/events}" class="btn btn-outline" th:text="#{common.cancel}">Cancel</a>
      </div>
    </form>
  </div>
</div>
</section>
</div>
</body>
</html>
