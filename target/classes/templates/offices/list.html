<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
  <title>BCC Offices</title>
</head>

<body>
  <div th:replace="~{fragments/layout :: layout(~{::section#content}, #{office.title})}">
    <section id="content">
      <div class="content">

        <!-- Page header -->
        <div class="page-header">
          <h2 th:text="#{office.title}">BCC Offices</h2>
          <a th:href="@{/offices/new}" class="btn btn-primary">
            + <span th:text="#{office.new}">New Office</span>
          </a>
        </div>

        <div th:if="${successMsg}" class="alert alert-success" th:text="${successMsg}"></div>
        <div th:if="${errorMsg}" class="alert alert-danger" th:text="${errorMsg}"></div>

        <div class="stats-row" style="margin-bottom:24px;">
          <div class="stat-card">
            <div class="stat-icon">🏢</div>
            <div class="stat-info">
              <span class="stat-value" th:text="${offices != null ? #lists.size(offices) : 0}">0</span>
              <span class="stat-label" th:text="#{office.totalOffices}">Total Offices</span>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-icon">✅</div>
            <div class="stat-info">
              <span class="stat-value" th:text="${offices != null ? #lists.size(offices.?[active]) : 0}">0</span>
              <span class="stat-label" th:text="#{office.activeOffices}">Active</span>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-icon">🌍</div>
            <div class="stat-info">
              <span class="stat-value" th:text="${countries != null ? #lists.size(countries) : 0}">0</span>
              <span class="stat-label">Countries</span>
            </div>
          </div>
        </div>

        <!-- Country filter -->
        <div class="card" style="padding:14px 20px; margin-bottom:16px; display:flex; align-items:center; gap:12px;">
          <span style="font-size:13px; font-weight:600; color:#64748b;" th:text="#{office.filterCountry}">Filter:</span>
          <div style="display:flex; flex-wrap:wrap; gap:6px;">
            <a href="/offices" class="btn btn-sm btn-outline" th:text="#{office.allCountries}">All</a>
            <a th:each="c : ${countries}" th:href="@{/offices(country=${c})}" class="btn btn-sm btn-outline"
              th:text="${c}">Country</a>
          </div>
        </div>

        <!-- Offices table -->
        <div class="card">
          <div th:if="${#lists.isEmpty(offices)}" class="empty-state" th:text="#{office.none}">No offices.</div>
          <table class="table" th:if="${not #lists.isEmpty(offices)}">
            <thead>
              <tr>
                <th th:text="#{office.code}">Code</th>
                <th th:text="#{office.name}">Name</th>
                <th th:text="#{office.country}">Country</th>
                <th th:text="#{office.city}">City</th>
                <th th:text="#{office.head}">Head</th>
                <th th:text="#{office.staffCount}">Staff</th>
                <th th:text="#{office.status}">Status</th>
                <th th:text="#{common.actions}">Actions</th>
              </tr>
            </thead>
            <tbody>
              <tr th:each="office : ${offices}">
                <td>
                  <span class="badge badge-blue" th:text="${office.code}">HQ</span>
                </td>
                <td style="font-weight:600;" th:text="${office.name}">Name</td>
                <td>
                  <span style="display:flex; align-items:center; gap:6px;">
                    <span th:text="${office.country}">Country</span>
                  </span>
                </td>
                <td th:text="${office.city}">City</td>
                <td th:text="${office.headOfOffice ?: '—'}">Head</td>
                <td>
                  <span class="badge badge-green" th:text="${office.staff.size()}">0</span>
                </td>
                <td>
                  <form th:action="@{/offices/{id}/toggle(id=${office.id})}" method="post" style="display:inline">
                    <button type="submit" class="badge" th:classappend="${office.active} ? 'badge-green' : 'badge-red'"
                      style="cursor:pointer; border:none;"
                      th:text="${office.active} ? #{office.active} : #{office.inactive}">Active</button>
                  </form>
                </td>
                <td class="action-btns">
                  <a th:href="@{/offices/{id}(id=${office.id})}" class="btn btn-sm btn-outline"
                    th:text="#{event.view}">View</a>
                  <a th:href="@{/offices/{id}/edit(id=${office.id})}" class="btn btn-sm btn-outline"
                    th:text="#{common.edit}">Edit</a>
                  <form th:action="@{/offices/{id}/delete(id=${office.id})}" method="post" style="display:inline"
                    th:onsubmit="'return confirm(\'' + #{office.confirmDelete} + '\')'">
                    <button type="submit" class="btn btn-sm btn-danger" th:text="#{common.delete}">Del</button>
                  </form>
                </td>
              </tr>
            </tbody>
          </table>
        </div>

      </div>
    </section>
  </div>
</body>

</html>
