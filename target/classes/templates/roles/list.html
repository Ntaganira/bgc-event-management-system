<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head><title>Roles</title></head>
<body>
<div th:replace="~{fragments/layout :: layout(~{::section#content}, #{role.title})}">
<section id="content">
<div class="content">

    <div class="page-header">
        <h2 th:text="#{role.title}">Roles &amp; Permissions</h2>
        <a th:href="@{/roles/new}" class="btn btn-primary">+ <span th:text="#{role.new}">New Role</span></a>
    </div>

    <div th:if="${successMsg}" class="alert alert-success" th:text="${successMsg}"></div>
    <div th:if="${errorMsg}"   class="alert alert-danger"  th:text="${errorMsg}"></div>

    <div class="card">
        <table class="table" th:if="${not #lists.isEmpty(roles)}">
            <thead>
                <tr>
                    <th>#</th>
                    <th th:text="#{role.name}">Role Name</th>
                    <th th:text="#{role.description}">Description</th>
                    <th th:text="#{role.permissions}">Permissions</th>
                    <th th:text="#{common.actions}">Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="role, s : ${roles}">
                    <td th:text="${s.index + 1}">1</td>
                    <td>
                        <span class="badge badge-blue"
                              th:text="${role.name.replace('ROLE_','')}">ADMIN</span>
                    </td>
                    <td th:text="${role.description ?: '—'}">Description</td>
                    <td>
                        <span th:each="perm : ${role.permissions}"
                              class="badge badge-green perm-badge"
                              th:text="${perm.name}">PERM</span>
                        <span th:if="${#sets.isEmpty(role.permissions)}" class="text-muted">—</span>
                    </td>
                    <td class="action-btns">
                        <a th:href="@{/roles/{id}(id=${role.id})}"
                           class="btn btn-sm btn-outline" th:text="#{common.edit}">Edit</a>
                        <form th:action="@{/roles/{id}/delete(id=${role.id})}" method="post"
                              style="display:inline"
                              th:onsubmit="'return confirm(\'' + #{role.confirmDelete} + '\')'">
                            <button type="submit" class="btn btn-sm btn-danger"
                                    th:text="#{role.delete}">Delete</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
        <p th:if="${#lists.isEmpty(roles)}" class="empty-state" th:text="#{role.none}">No roles.</p>
    </div>

</div>
</section>
</div>
</body>
</html>
