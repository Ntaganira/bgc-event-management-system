<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      th:fragment="layout(content)">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="${subject}">BGC Event</title>
</head>
<!--
  Email layout — all CSS must be inline (Gmail/Outlook strip <style> blocks).
  Use th:replace="~{email/layout :: layout(~{::section})}" in child templates.
-->
<body style="margin:0;padding:0;background-color:#f1f5f9;
             font-family:'Segoe UI',Arial,sans-serif;-webkit-font-smoothing:antialiased;">

  <table width="100%" cellpadding="0" cellspacing="0" border="0"
         style="background-color:#f1f5f9;padding:40px 16px;">
    <tr>
      <td align="center">

        <!-- ═══ CARD ═══════════════════════════════════════════════════ -->
        <table width="100%" cellpadding="0" cellspacing="0" border="0"
               style="max-width:560px;background:#ffffff;border-radius:12px;
                      box-shadow:0 4px 24px rgba(0,0,0,0.08);overflow:hidden;">

          <!-- Header band -->
          <tr>
            <td style="background:#2563EB;padding:32px 40px;text-align:center;">
              <p style="margin:0;font-size:28px;font-weight:800;color:#ffffff;
                        letter-spacing:2px;font-family:Arial,sans-serif;">BGC</p>
              <p style="margin:6px 0 0;font-size:12px;color:rgba(255,255,255,0.75);
                        letter-spacing:1px;text-transform:uppercase;">
                Event Management System
              </p>
            </td>
          </tr>

          <!-- ═══ CONTENT SLOT ════════════════════════════════════════ -->
          <tr>
            <td>
              <th:block th:replace="${content}"/>
            </td>
          </tr>
          <!-- ═══════════════════════════════════════════════════════════ -->

          <!-- Divider -->
          <tr>
            <td style="padding:0 40px;">
              <hr style="border:none;border-top:1px solid #e5e7eb;margin:0;">
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="padding:20px 40px 32px;text-align:center;">
              <p style="margin:0;font-size:12px;color:#9ca3af;line-height:1.7;"
                 th:text="#{email.reset.footer}">
                This email was sent by BGC Event Management System.
              </p>
            </td>
          </tr>

        </table>
        <!-- ═══ /CARD ══════════════════════════════════════════════════ -->

      </td>
    </tr>
  </table>

</body>
</html>
