<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{auth.forgot.title} + ' | BGC Event'">Forgot Password</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body class="auth-body">
<div class="auth-container">
    <div class="auth-card">

        <div class="auth-logo">
            <div class="logo-icon">BGC</div>
        </div>

        <!-- Icon -->
        <div style="font-size:40px; text-align:center; margin-bottom:8px;">🔑</div>

        <h2 class="auth-title"    th:text="#{auth.forgot.title}">Forgot your password?</h2>
        <p  class="auth-subtitle" th:text="#{auth.forgot.subtitle}">Enter your email to receive a reset link.</p>

        <!-- Language switcher -->
        <div class="lang-switcher" style="justify-content:center; margin-bottom:16px;">
            <a th:href="@{/forgot-password(lang=en)}"
               th:classappend="${#locale.language=='en'}?' active'" class="lang-btn">EN</a>
            <span class="lang-sep">|</span>
            <a th:href="@{/forgot-password(lang=fr)}"
               th:classappend="${#locale.language=='fr'}?' active'" class="lang-btn">FR</a>
        </div>

        <!-- Success (after submission) -->
        <div th:if="${successMsg}" class="alert alert-success">
            <span style="font-size:18px; margin-right:6px;">✅</span>
            <span th:text="${successMsg}"></span>
        </div>

        <!-- Form (hide after sent) -->
        <form th:if="${successMsg == null}" th:action="@{/forgot-password}" method="post" class="auth-form">
            <div class="form-group">
                <label th:text="#{auth.forgot.email}">Email address</label>
                <input type="email" name="email" class="form-control"
                       placeholder="you@example.com" required autofocus>
            </div>
            <button type="submit" class="btn btn-primary btn-full"
                    th:text="#{auth.forgot.submit}">Send Reset Link</button>
        </form>

        <p class="auth-footer" style="margin-top:20px;">
            <a th:href="@{/login}">
                ← <span th:text="#{auth.forgot.back}">Back to login</span>
            </a>
        </p>
    </div>
</div>
</body>
</html>
