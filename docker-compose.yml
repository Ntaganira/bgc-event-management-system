version: '3.8'
# BGC Event Management System - Docker Compose
# Author: NTAGANIRA Heritier | Date: 2026-02-27

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: bgceventdb
      POSTGRES_USER: bgcuser
      POSTGRES_PASSWORD: bgcpassword
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bgcuser -d bgceventdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_USERNAME: bgcuser
      DB_PASSWORD: bgcpassword
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/bgceventdb
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
