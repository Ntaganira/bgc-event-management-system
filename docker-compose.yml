version: '3.8'

services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: bgc_timescaledb
    environment:
      POSTGRES_DB: bgc_event_db
      POSTGRES_USER: bgc_user
      POSTGRES_PASSWORD: bgc_password
      TIMESCALEDB_TELEMETRY: off
    ports:
      - "5432:5432"
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
      - ./docker/db/init:/docker-entrypoint-initdb.d
    networks:
      - bgc_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bgc_user -d bgc_event_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: bgc_redis
    command: redis-server --requirepass bgc_redis_password
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - bgc_network
    restart: unless-stopped

volumes:
  timescaledb_data:
  redis_data:

networks:
  bgc_network:
    driver: bridge