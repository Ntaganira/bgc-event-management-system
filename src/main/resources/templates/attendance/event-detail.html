<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head><title>Attendance Detail</title></head>
<body>
<div th:replace="~{fragments/layout :: layout(~{::section#content}, #{attendance.detail})}">
<section id="content">
<div class="content">
  <div class="page-header">
    <h2 th:text="${event.title}">Event</h2>
    <a th:href="@{/attendance}" class="btn btn-outline">← <span th:text="#{common.back}">Back</span></a>
  </div>
  <div class="card">
    <div style="margin-bottom:12px;">
      <span class="badge badge-blue"
            th:text="${count} + ' ' + #{attendance.total}">0 checked in</span>
    </div>
    <div th:if="${#lists.isEmpty(records)}" class="empty-state">No check-ins yet.</div>
    <table class="table" th:if="${not #lists.isEmpty(attendanceList)}">
      <thead><tr>
        <th th:text="#{user.name}">Name</th>
        <th th:text="#{user.email}">Email</th>
        <th th:text="#{attendance.method}">Method</th>
        <th th:text="#{attendance.time}">Time</th>
      </tr></thead>
      <tbody>
        <tr th:each="a : ${records}">
          <td th:text="${a.user.fullName}">Name</td>
          <td th:text="${a.user.email}">Email</td>
          <td><span class="badge"
                    th:classappend="${a.method.name() == 'QR'} ? 'badge-blue' : 'badge-green'"
                    th:text="${a.method}">QR</span></td>
          <td th:text="${#temporals.format(a.attendanceTime,'dd MMM yyyy HH:mm')}">Time</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
</section>
</div>
</body>
</html>
