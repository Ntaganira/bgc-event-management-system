<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head><title>Password Reset</title></head>

<!--
  Rendered by TemplateEngine (not the web MVC engine).
  Variables injected from PasswordResetServiceImpl:
    ${firstName}   — user's first name
    ${resetLink}   — full reset URL with token
    ${expiryMins}  — token lifetime in minutes
    ${subject}     — email subject (used in layout <title>)
  All text strings come from #{email.reset.*} — resolved per user locale.
-->
<body>
<div th:replace="~{email/layout :: layout(~{::section#body})}">
<section id="body">

  <!-- Icon -->
  <table width="100%" cellpadding="0" cellspacing="0" border="0">
    <tr>
      <td style="text-align:center;padding:32px 40px 0;">
        <div style="display:inline-block;background:#eff6ff;border-radius:50%;
                    width:64px;height:64px;line-height:64px;font-size:28px;
                    text-align:center;">🔑</div>
      </td>
    </tr>
  </table>

  <!-- Heading + body copy -->
  <table width="100%" cellpadding="0" cellspacing="0" border="0">
    <tr>
      <td style="padding:24px 40px 8px;">
        <h1 style="margin:0 0 12px;font-size:22px;font-weight:700;color:#1E3A5F;"
            th:text="#{email.reset.heading}">Password Reset Request</h1>

        <p style="margin:0 0 6px;font-size:15px;color:#374151;line-height:1.6;">
          <span th:text="#{email.reset.greeting}">Hello</span>
          <strong th:text="${firstName}">User</strong>,
        </p>

        <p style="margin:0 0 24px;font-size:15px;color:#374151;line-height:1.6;"
           th:text="#{email.reset.intro}">
          We received a request to reset your password.
        </p>
      </td>
    </tr>
  </table>

  <!-- CTA button -->
  <table width="100%" cellpadding="0" cellspacing="0" border="0">
    <tr>
      <td style="padding:0 40px 28px;text-align:center;">
        <a th:href="${resetLink}"
           style="display:inline-block;background:#2563EB;color:#ffffff;
                  text-decoration:none;font-size:15px;font-weight:600;
                  padding:14px 36px;border-radius:8px;letter-spacing:0.3px;">
          <span th:text="#{email.reset.button}">Reset My Password</span>
        </a>
      </td>
    </tr>
  </table>

  <!-- Expiry warning box -->
  <table width="100%" cellpadding="0" cellspacing="0" border="0">
    <tr>
      <td style="padding:0 40px 28px;">
        <table width="100%" cellpadding="0" cellspacing="0" border="0">
          <tr>
            <td style="background:#fef9c3;border-left:4px solid #f59e0b;
                        border-radius:6px;padding:12px 16px;">
              <p style="margin:0;font-size:13px;color:#92400e;line-height:1.6;">
                ⏱ <strong
                  th:text="#{email.reset.expiry(${expiryMins})}">
                  This link expires in 30 minutes.
                </strong>
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>

  <!-- Raw link fallback -->
  <table width="100%" cellpadding="0" cellspacing="0" border="0">
    <tr>
      <td style="padding:0 40px 32px;">
        <p style="margin:0 0 6px;font-size:12px;color:#9ca3af;"
           th:text="#{email.reset.fallback}">
          If the button doesn't work, copy this link:
        </p>
        <p style="margin:0;font-size:12px;color:#2563EB;word-break:break-all;"
           th:text="${resetLink}">http://...</p>
      </td>
    </tr>
  </table>

</section>
</div>
</body>
</html>
