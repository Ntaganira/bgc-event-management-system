<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{auth.register.title} + ' | BGC Event'">Register</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body class="auth-body">
<div class="auth-container">
    <div class="auth-card" style="max-width:560px;">
        <div class="auth-logo">
            <div class="logo-icon">BGC</div>
        </div>
        <h2 class="auth-title"    th:text="#{auth.register.title}">Create account</h2>
        <p  class="auth-subtitle" th:text="#{auth.register.subtitle}">Register</p>

        <div class="lang-switcher" style="justify-content:center; margin-bottom:16px;">
            <a th:href="@{/register(lang=en)}" th:classappend="${#locale.language=='en'}?' active'" class="lang-btn">EN</a>
            <span class="lang-sep">|</span>
            <a th:href="@{/register(lang=fr)}" th:classappend="${#locale.language=='fr'}?' active'" class="lang-btn">FR</a>
        </div>

        <div th:if="${errorMsg}" class="alert alert-danger" th:text="${errorMsg}"></div>

        <form th:action="@{/register}" th:object="${registerDto}" method="post" class="auth-form">
            <div class="form-row">
                <div class="form-group">
                    <label th:text="#{auth.register.firstName}">First Name</label>
                    <input type="text" th:field="*{firstName}" class="form-control">
                    <span class="field-error" th:errors="*{firstName}"></span>
                </div>
                <div class="form-group">
                    <label th:text="#{auth.register.lastName}">Last Name</label>
                    <input type="text" th:field="*{lastName}" class="form-control">
                    <span class="field-error" th:errors="*{lastName}"></span>
                </div>
            </div>
            <div class="form-group">
                <label th:text="#{auth.register.email}">Email</label>
                <input type="email" th:field="*{email}" class="form-control">
                <span class="field-error" th:errors="*{email}"></span>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label th:text="#{auth.register.phone}">Phone</label>
                    <input type="text" th:field="*{phoneNumber}" class="form-control">
                </div>
                <div class="form-group">
                    <label th:text="#{auth.register.branch}">Branch</label>
                    <input type="text" th:field="*{branch}" class="form-control">
                </div>
            </div>
            <div class="form-group">
                <label th:text="#{auth.register.title2}">Title</label>
                <input type="text" th:field="*{title}" class="form-control">
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label th:text="#{auth.register.arrivalDate}">Arrival Date</label>
                    <input type="date" th:field="*{arrivalDate}" class="form-control">
                </div>
                <div class="form-group">
                    <label th:text="#{auth.register.returnDate}">Return Date</label>
                    <input type="date" th:field="*{returnDate}" class="form-control">
                </div>
            </div>
            <div class="form-group">
                <label th:text="#{auth.register.password}">Password</label>
                <input type="password" th:field="*{password}" class="form-control">
                <span class="field-error" th:errors="*{password}"></span>
            </div>
            <button type="submit" class="btn btn-primary btn-full"
                    th:text="#{auth.register.submit}">Create Account</button>
        </form>
        <p class="auth-footer">
            <a th:href="@{/login}" th:text="#{auth.register.login}">Already have an account?</a>
        </p>
    </div>
</div>
</body>
</html>
