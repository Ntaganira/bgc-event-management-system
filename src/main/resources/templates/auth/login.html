<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Hone</title>
      <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    html, body {
      height: 100%;
    }

    .login-wrap {
              display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      max-width: 26rem;
      animation: slideUp .45s cubic-bezier(.22,.68,0,1.2) both;
    }

    .login-card {
      background: #ffffff;
      border-radius: 1.25rem;
      box-shadow: 0 6px 32px rgba(0,0,0,0.08), 0 1px 3px rgba(0,0,0,0.05);
      padding: 2.25rem 2.5rem 2rem;
    }

    /* Header */
    .login-header {
      text-align: center;
      margin-bottom: 1.75rem;
    }

    .login-eyebrow {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #1e3d6e;
      margin-bottom: 0.45rem;
    }

    .login-divider {
      width: 2.25rem;
      height: 2px;
      background: #1e3d6e;
      margin: 0.45rem auto 0.85rem;
      border-radius: 2px;
    }

    .login-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      font-weight: 900;
      color: #0d1b2e;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    /* Fields */
    .login-field {
      margin-bottom: 1rem;
    }

    .login-field label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: #374151;
      margin-bottom: 0.4rem;
    }

    .login-field input {
      width: 100%;
      padding: 0.65rem 0.9rem;
      border: 1.5px solid #e5e7eb;
      border-radius: 0.5rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      color: #111827;
      background: #ffffff;
      outline: none;
      transition: border-color .18s, box-shadow .18s;
    }

    .login-field input::placeholder { color: #b0b7c3; }

    .login-field input:focus {
      border-color: #1e3d6e;
      box-shadow: 0 0 0 3px rgba(30,61,110,0.08);
    }

    .login-field input.is-error { border-color: #f87171; }
    .login-field input.is-error:focus {
      border-color: #ef4444;
      box-shadow: 0 0 0 3px rgba(239,68,68,0.08);
    }

    .login-err {
      color: #ef4444;
      font-size: 0.68rem;
      margin-top: 0.25rem;
      min-height: 0.9rem;
    }

    /* Button */
    .btn-login {
      width: 100%;
      background: #1e3d6e;
      color: #ffffff;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      padding: 0.8rem;
      border: none;
      border-radius: 0.5rem;
      cursor: pointer;
      margin-top: 1rem;
      transition: background .18s, box-shadow .18s, transform .12s;
      box-shadow: 0 3px 14px rgba(30,61,110,0.25);
    }

    .btn-login:hover {
      background: #16315a;
      box-shadow: 0 5px 20px rgba(30,61,110,0.35);
      transform: translateY(-1px);
    }

    .btn-login:active { transform: translateY(0); }

    /* Footer links */
    .login-links {
      margin-top: 1.25rem;
      text-align: center;
    }

    .login-links p {
      font-size: 0.75rem;
      color: #9ca3af;
      margin-bottom: 0.3rem;
    }

    .login-links a {
      color: #1e3d6e;
      font-weight: 700;
      text-decoration: none;
    }

    .login-links a:hover { text-decoration: underline; }
  </style>
</head>

<body>
    <div th:replace="~{website/layout :: layout(~{::section#content}, #{dashboard.title})}">
        <section id="content">
            <div class="login-wrap">
                <div class="login-card">

                    <div class="login-header">
                        <p class="login-eyebrow">BCC Global Congress</p>
                        <div class="login-divider"></div>
                        <h1 class="login-title">Login</h1>
                    </div>

                    <div class="login-field">
                        <label for="username">User name</label>
                        <input id="username" type="text" placeholder="Enter your username" />
                        <p class="login-err" id="err-username"></p>
                    </div>

                    <div class="login-field">
                        <label for="password">Password</label>
                        <input id="password" type="password" placeholder="Enter Password" />
                        <p class="login-err" id="err-password"></p>
                    </div>

                    <button class="btn-login" onclick="handleLogin()">Login</button>

                    <div class="login-links">
                        <p>Don't have an account? <a href="register.html">Register here</a></p>
                        <p><a href="index.html">← Back to Home</a></p>
                    </div>

                </div>
            </div>
        </section>
    </div>
</body>
  <script>
    function handleLogin() {
      let valid = true;
      ['username','password'].forEach(id => {
        document.getElementById(id).classList.remove('is-error');
        document.getElementById('err-'+id).textContent = '';
      });
      function setErr(id, msg) {
        document.getElementById(id).classList.add('is-error');
        document.getElementById('err-'+id).textContent = msg;
        valid = false;
      }
      if (!document.getElementById('username').value.trim()) setErr('username','Username is required');
      if (!document.getElementById('password').value.trim()) setErr('password','Password is required');
      if (!valid) return;
      window.location.href = 'index.html';
    }
    document.querySelectorAll('input').forEach(el =>
      el.addEventListener('keydown', e => { if (e.key==='Enter') handleLogin(); })
    );
  </script>
</html>
