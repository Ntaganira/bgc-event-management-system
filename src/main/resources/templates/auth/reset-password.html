<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{auth.reset.title} + ' | BGC Event'">Reset Password</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body class="auth-body">
<div class="auth-container">
    <div class="auth-card">

        <div class="auth-logo">
            <div class="logo-icon">BGC</div>
        </div>

        <div style="font-size:40px; text-align:center; margin-bottom:8px;">🔒</div>

        <h2 class="auth-title"    th:text="#{auth.reset.title}">Set new password</h2>
        <p  class="auth-subtitle" th:text="#{auth.reset.subtitle}">Choose a strong password.</p>

        <!-- Language switcher -->
        <div class="lang-switcher" style="justify-content:center; margin-bottom:16px;">
            <a th:href="@{''(lang=en)}" th:classappend="${#locale.language=='en'}?' active'" class="lang-btn">EN</a>
            <span class="lang-sep">|</span>
            <a th:href="@{''(lang=fr)}" th:classappend="${#locale.language=='fr'}?' active'" class="lang-btn">FR</a>
        </div>

        <!-- Invalid / expired token -->
        <div th:if="${tokenInvalid}" class="alert alert-danger">
            <span style="font-size:18px; margin-right:6px;">❌</span>
            <span th:text="${errorMsg}">Invalid link.</span>
            <div style="margin-top:10px;">
                <a th:href="@{/forgot-password}" class="btn btn-outline btn-full"
                   th:text="#{auth.forgot.submit}">Request new link</a>
            </div>
        </div>

        <!-- Error (mismatch / server error) -->
        <div th:if="${errorMsg != null and tokenInvalid == null}"
             class="alert alert-danger" th:text="${errorMsg}"></div>

        <!-- Reset form -->
        <form th:if="${token != null and tokenInvalid == null}"
              th:action="@{/reset-password}" method="post" class="auth-form"
              id="resetForm">
            <input type="hidden" name="token" th:value="${token}">

            <div class="form-group">
                <label th:text="#{auth.reset.password}">New Password</label>
                <div class="password-input-wrap">
                    <input type="password" name="password" id="password"
                           class="form-control" minlength="6"
                           th:placeholder="#{validation.password.min}"
                           required autocomplete="new-password">
                    <button type="button" class="toggle-pw" onclick="togglePw('password')">👁</button>
                </div>
                <!-- Strength indicator -->
                <div class="pw-strength-bar" id="strengthBar">
                    <div class="pw-strength-fill" id="strengthFill"></div>
                </div>
                <small class="text-muted" id="strengthLabel"></small>
            </div>

            <div class="form-group">
                <label th:text="#{auth.reset.confirm}">Confirm Password</label>
                <div class="password-input-wrap">
                    <input type="password" name="confirmPassword" id="confirmPassword"
                           class="form-control" minlength="6"
                           required autocomplete="new-password">
                    <button type="button" class="toggle-pw" onclick="togglePw('confirmPassword')">👁</button>
                </div>
                <small id="matchMsg" style="font-size:12px;"></small>
            </div>

            <button type="submit" class="btn btn-primary btn-full" id="submitBtn"
                    th:text="#{auth.reset.submit}">Reset Password</button>
        </form>

        <p class="auth-footer" style="margin-top:20px;">
            <a th:href="@{/login}">
                ← <span th:text="#{auth.forgot.back}">Back to login</span>
            </a>
        </p>
    </div>
</div>

<script>
// ── Toggle password visibility ─────────────────────────────────
function togglePw(id) {
    const input = document.getElementById(id);
    input.type = input.type === 'password' ? 'text' : 'password';
}

// ── Password strength ──────────────────────────────────────────
const pwInput      = document.getElementById('password');
const strengthFill = document.getElementById('strengthFill');
const strengthLabel= document.getElementById('strengthLabel');

if (pwInput) {
    pwInput.addEventListener('input', function() {
        const val = this.value;
        let score = 0;
        if (val.length >= 6)  score++;
        if (val.length >= 10) score++;
        if (/[A-Z]/.test(val)) score++;
        if (/[0-9]/.test(val)) score++;
        if (/[^A-Za-z0-9]/.test(val)) score++;

        const labels = ['', 'Weak', 'Fair', 'Good', 'Strong', 'Very Strong'];
        const colors = ['', '#ef4444', '#f97316', '#eab308', '#22c55e', '#16a34a'];
        const width  = (score / 5) * 100;

        strengthFill.style.width = width + '%';
        strengthFill.style.background = colors[score] || '#e2e8f0';
        strengthLabel.textContent = labels[score] || '';
        strengthLabel.style.color = colors[score] || '';

        checkMatch();
    });
}

// ── Password match validation ──────────────────────────────────
const confirmInput = document.getElementById('confirmPassword');
const matchMsg     = document.getElementById('matchMsg');
const submitBtn    = document.getElementById('submitBtn');

function checkMatch() {
    if (!confirmInput || !confirmInput.value) return;
    const match = pwInput.value === confirmInput.value;
    matchMsg.textContent = match ? '✔ Passwords match' : '✘ Passwords do not match';
    matchMsg.style.color = match ? '#16a34a' : '#ef4444';
    if (submitBtn) submitBtn.disabled = !match;
}

if (confirmInput) confirmInput.addEventListener('input', checkMatch);

// Prevent submit if mismatch
const form = document.getElementById('resetForm');
if (form) {
    form.addEventListener('submit', function(e) {
        if (pwInput.value !== confirmInput.value) {
            e.preventDefault();
            checkMatch();
        }
    });
}
</script>
</body>
</html>
