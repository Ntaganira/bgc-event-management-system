<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{auth.login.title} + ' | BGC Event'">Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body class="auth-body">
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-logo">
            <div class="logo-icon">BGC</div>
        </div>
        <h2 class="auth-title" th:text="#{auth.login.title}">Welcome back</h2>
        <p class="auth-subtitle" th:text="#{auth.login.subtitle}">Sign in to BGC Event</p>

        <!-- Language switcher on login page -->
        <div class="lang-switcher" style="justify-content:center; margin-bottom:16px;">
            <a th:href="@{/login(lang=en)}"
               th:classappend="${#locale.language == 'en'} ? ' active'"
               class="lang-btn">EN</a>
            <span class="lang-sep">|</span>
            <a th:href="@{/login(lang=fr)}"
               th:classappend="${#locale.language == 'fr'} ? ' active'"
               class="lang-btn">FR</a>
        </div>

        <div th:if="${errorMsg}"   class="alert alert-danger"  th:text="${errorMsg}"></div>
        <div th:if="${successMsg}" class="alert alert-success" th:text="${successMsg}"></div>
        <div th:if="${logoutMsg}"  class="alert alert-info"    th:text="${logoutMsg}"></div>

        <form th:action="@{/login}" method="post" class="auth-form">
            <div class="form-group">
                <label th:text="#{auth.login.email}">Email</label>
                <input type="email" name="username" class="form-control"
                       placeholder="you@example.com" required autofocus>
            </div>
            <div class="form-group">
                <label th:text="#{auth.login.password}">Password</label>
                <input type="password" name="password" class="form-control"
                       placeholder="••••••••" required>
            </div>
            <div style="text-align:right; margin:-8px 0 12px;"><a th:href="@{/forgot-password}" style="font-size:13px; color:#2563eb;" th:text="#{auth.forgot.title}">Forgot password?</a></div>
            <button type="submit" class="btn btn-primary btn-full"
                    th:text="#{auth.login.submit}">Sign In</button>
        </form>

        <p class="auth-footer">
            <span th:text="#{auth.login.register}">Don't have an account?</span>
            <a th:href="@{/register}">→</a>
        </p>
        <p class="auth-hint"><small th:text="#{auth.login.hint}">ntaganira71@gmail.com / Admin@123</small></p>
    </div>
</div>
</body>
</html>
