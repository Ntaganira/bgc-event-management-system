<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head><title>Office Detail</title></head>
<body>
<div th:replace="~{fragments/layout :: layout(~{::section#content}, ${office.name})}">
<section id="content">
<div class="content">

  <div class="page-header">
    <div style="display:flex; align-items:center; gap:12px;">
      <span class="badge badge-blue" style="font-size:16px; padding:6px 14px;"
            th:text="${office.code}">HQ</span>
      <h2 th:text="${office.name}">Office</h2>
      <span class="badge"
            th:classappend="${office.active} ? 'badge-green' : 'badge-red'"
            th:text="${office.active} ? #{office.active} : #{office.inactive}">Active</span>
    </div>
    <div class="page-actions">
      <a th:href="@{/offices}" class="btn btn-outline">← <span th:text="#{common.back}">Back</span></a>
      <a th:href="@{/offices/{id}/edit(id=${office.id})}"
         class="btn btn-primary" th:text="#{common.edit}">Edit</a>
    </div>
  </div>

  <div th:if="${successMsg}" class="alert alert-success" th:text="${successMsg}"></div>
  <div th:if="${errorMsg}"   class="alert alert-danger"  th:text="${errorMsg}"></div>

  <div class="dashboard-grid">

    <!-- Office details card -->
    <div class="card">
      <h3 class="card-title">Office Info</h3>
      <div class="detail-row">
        <span class="detail-label" th:text="#{office.code}">Code</span>
        <span class="badge badge-blue" th:text="${office.code}">HQ</span>
      </div>
      <div class="detail-row">
        <span class="detail-label" th:text="#{office.country}">Country</span>
        <span th:text="${office.country}">—</span>
      </div>
      <div class="detail-row">
        <span class="detail-label" th:text="#{office.city}">City</span>
        <span th:text="${office.city}">—</span>
      </div>
      <div class="detail-row">
        <span class="detail-label" th:text="#{office.address}">Address</span>
        <span th:text="${office.address ?: '—'}">—</span>
      </div>
      <div class="detail-row">
        <span class="detail-label" th:text="#{office.phone}">Phone</span>
        <span th:text="${office.phone ?: '—'}">—</span>
      </div>
      <div class="detail-row">
        <span class="detail-label" th:text="#{office.email}">Email</span>
        <a th:if="${office.email}"
           th:href="'mailto:' + ${office.email}"
           th:text="${office.email}">—</a>
        <span th:unless="${office.email}">—</span>
      </div>
      <div class="detail-row">
        <span class="detail-label" th:text="#{office.head}">Head</span>
        <span th:text="${office.headOfOffice ?: '—'}">—</span>
      </div>
      <div class="detail-row">
        <span class="detail-label" th:text="#{office.staffCount}">Staff</span>
        <span class="badge badge-green" th:text="${staffCount}">0</span>
      </div>
    </div>

    <!-- Staff management card -->
    <div class="card">
      <h3 class="card-title" th:text="#{office.staff}">Staff Members</h3>

      <!-- Current staff -->
      <div th:if="${not #lists.isEmpty(staff)}">
        <table class="table" style="margin-bottom:16px;">
          <thead><tr>
            <th th:text="#{user.name}">Name</th>
            <th th:text="#{user.email}">Email</th>
            <th th:text="#{user.roles}">Roles</th>
            <th></th>
          </tr></thead>
          <tbody>
            <tr th:each="member : ${staff}">
              <td th:text="${member.fullName}">Name</td>
              <td th:text="${member.email}">Email</td>
              <td>
                <span th:each="r : ${member.roles}"
                      class="badge badge-blue"
                      style="font-size:10px;"
                      th:text="${r.name.replace('ROLE_','')}">R</span>
              </td>
              <td>
                <form th:action="@{/offices/{id}/staff/remove(id=${office.id})}"
                      method="post" style="display:inline">
                  <input type="hidden" name="userId" th:value="${member.id}">
                  <button type="submit" class="btn btn-sm btn-danger"
                          th:text="#{common.delete}">Remove</button>
                </form>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
      <p th:if="${#lists.isEmpty(staff)}" class="empty-state">No staff assigned yet.</p>

      <!-- Assign new staff -->
      <div th:if="${not #lists.isEmpty(allUsers)}">
        <h4 style="font-size:13px; font-weight:600; margin-bottom:8px;"
            th:text="#{office.assignStaff}">Assign Staff</h4>
        <form th:action="@{/offices/{id}/staff/add(id=${office.id})}"
              method="post" class="form-inline">
          <select name="userId" class="form-control" style="flex:1;" required>
            <option value="" th:text="#{office.selectUser}">Select user</option>
            <option th:each="u : ${allUsers}"
                    th:value="${u.id}"
                    th:text="${u.fullName + ' — ' + u.email}">User</option>
          </select>
          <button type="submit" class="btn btn-primary" th:text="#{common.save}">Assign</button>
        </form>
      </div>
    </div>

  </div>
</div>
</section>
</div>
</body>
</html>
