<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head><title>Calendar</title></head>
<body>
<div th:replace="~{fragments/layout :: layout(~{::section#content}, #{nav.calendar})}">
<section id="content">
<div class="content">
  <div class="page-header">
    <h2 th:text="#{nav.calendar}">Calendar</h2>
    <a th:href="@{/events}" class="btn btn-outline" th:text="#{event.list}">List View</a>
  </div>
  <div class="card" style="padding:0;">
    <div id="calendar" style="padding:20px;"></div>
  </div>
  <script th:inline="javascript">
    document.addEventListener('DOMContentLoaded', function() {
      var cal = new FullCalendar.Calendar(document.getElementById('calendar'), {
        initialView: 'dayGridMonth',
        headerToolbar: { left:'prev,next today', center:'title', right:'dayGridMonth,timeGridWeek,timeGridDay,listWeek' },
        events: '/api/events/calendar',
        eventClick: function(info) { window.location.href = '/events/' + info.event.id; }
      });
      cal.render();
    });
  </script>
</div>
</section>
</div>
</body>
</html>
