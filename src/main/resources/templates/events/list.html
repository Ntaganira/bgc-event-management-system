<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
  <title>Events</title>
</head>

<body>
  <div th:replace="~{fragments/layout :: layout(~{::section#content}, #{event.title})}">
    <section id="content">
      <div class="content">

        <div class="page-header">
          
          <!-- Search -->
        <form th:action="@{/events}" method="get" class="search-bar" style="margin-bottom:16px;">
          <input type="text" name="search" th:value="${search}" th:placeholder="#{common.search}" autocomplete="off">
          <button type="submit" class="btn btn-outline" th:text="#{common.search}">Search</button>
          <a th:if="${search != ''}" th:href="@{/events}" class="btn btn-outline" th:text="#{common.clear}">Clear</a>
        </form>
        
          <div class="page-actions">
            <a th:href="@{/events/calendar}" class="btn btn-outline" th:text="#{event.calendar}">Calendar</a>
            <a th:href="@{/export/events/excel}" class="btn btn-outline export-btn"><i class="fas fa-file-excel" style ="color: #0f172a;"></i> <span
                th:text="#{export.excel}">Excel</span></a>
            <a th:href="@{/export/events/pdf}" class="btn btn-outline export-btn"><i class="fas fa-file-pdf" style ="color: #0f172a;"></i> <span
                th:text="#{export.pdf}">PDF</span></a>
            <a th:href="@{/events/new}" class="btn btn-primary" sec:authorize="hasAuthority('CREATE_EVENT')">+ <span
                th:text="#{event.new}">New</span></a>
          </div>
        </div>

        

        <div th:if="${successMsg}" class="alert alert-success" th:text="${successMsg}"></div>
        <div th:if="${errorMsg}" class="alert alert-danger" th:text="${errorMsg}"></div>

        <div class="card">
          <div th:if="${eventsPage.isEmpty()}" class="empty-state" th:text="#{event.none}">No events.</div>
          <table class="table" th:if="${!eventsPage.isEmpty()}">
            <thead>
              <tr>
                <th th:text="#{event.title}">Title</th>
                <th th:text="#{event.location}">Location</th>
                <th th:text="#{event.startDate}">Start</th>
                <th th:text="#{event.endDate}">End</th>
                <th th:text="#{dashboard.totalAttendance}">Attendance</th>
                <th th:text="#{common.actions}">Actions</th>
              </tr>
            </thead>
            <tbody>
              <tr th:each="event : ${eventsPage.content}">
                <td style="font-weight:600;" th:text="${event.title}">Title</td>
                <td th:text="${event.location ?: '—'}">Location</td>
                <td th:text="${#temporals.format(event.startDateTime,'dd MMM yyyy, HH:mm')}">Start</td>
                <td th:text="${#temporals.format(event.endDateTime,  'dd MMM yyyy, HH:mm')}">End</td>
                <td><span class="badge badge-blue" th:text="${event.attendanceRecords.size()}">0</span></td>
                <td class="action-btns">
                  <a th:href="@{/events/{id}(id=${event.id})}" class="btn btn-sm btn-outline"
                    th:text="#{event.view}">View</a>
                  <a th:href="@{/events/{id}/edit(id=${event.id})}" class="btn btn-sm btn-outline"
                    sec:authorize="hasAuthority('EDIT_EVENT')" th:text="#{common.edit}">Edit</a>
                  <form th:action="@{/events/{id}/delete(id=${event.id})}" method="post" style="display:inline"
                    th:onsubmit="'return confirm(\'' + #{event.confirmDelete} + '\')'">
                    <button type="submit" class="btn btn-sm btn-danger" sec:authorize="hasAuthority('DELETE_EVENT')"
                      th:text="#{common.delete}">Del</button>
                  </form>
                </td>
              </tr>
            </tbody>
          </table>

          <!-- Pagination -->
          <div th:replace="~{fragments/pagination :: pagination(${eventsPage}, '/events', 'search=' + ${search})}">
          </div>
        </div>

      </div>
    </section>
  </div>
</body>

</html>
