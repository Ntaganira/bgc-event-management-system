<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head><title>Audit Logs</title></head>
<body>
<div th:replace="~{fragments/layout :: layout(~{::section#content}, #{audit.title})}">
<section id="content">
<div class="content">
  <div class="page-header">
    <h2 th:text="#{audit.title}">Audit Logs</h2>
  </div>
  <div class="card">
    <form th:action="@{/audit}" method="get" class="form-inline" style="margin-bottom:16px;">
      <input type="text" name="search" class="form-control"
             th:value="${search}"
             th:placeholder="#{audit.search}" style="flex:1; max-width:320px;">
      <button type="submit" class="btn btn-primary" th:text="#{audit.search.btn}">Search</button>
    </form>
    <table class="table">
      <thead><tr>
        <th>#</th>
        <th th:text="#{audit.user}">User</th>
        <th th:text="#{audit.action}">Action</th>
        <th th:text="#{audit.entity}">Entity</th>
        <th th:text="#{audit.ip}">IP</th>
        <th th:text="#{audit.time}">Time</th>
      </tr></thead>
      <tbody>
        <tr th:each="log, s : ${logs}">
          <td th:text="${logs.number * logs.size + s.index + 1}">1</td>
          <td th:text="${log.username}">user</td>
          <td><span class="badge badge-blue" th:text="${log.action}">ACTION</span></td>
          <td th:text="${log.entityName + (log.entityId != null ? ' #' + log.entityId : '')}">—</td>
          <td th:text="${log.ipAddress ?: '—'}">—</td>
          <td th:text="${#temporals.format(log.createdAt,'dd MMM yyyy HH:mm')}">—</td>
        </tr>
        <tr th:if="${logs.isEmpty()}">
          <td colspan="6" class="empty-state" th:text="#{common.none}">None</td>
        </tr>
      </tbody>
    </table>
    <!-- Pagination -->
    <div class="pagination" th:if="${logs.totalPages > 1}">
      <a th:each="i : ${#numbers.sequence(0, logs.totalPages - 1)}"
         th:href="@{/audit(page=${i}, search=${search})}"
         class="btn btn-sm btn-outline"
         th:classappend="${i == logs.number} ? ' btn-primary'"
         th:text="${i + 1}">1</a>
    </div>
  </div>
</div>
</section>
</div>
</body>
</html>
