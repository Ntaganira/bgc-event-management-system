<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head><title>Users</title></head>
<body>
<div th:replace="~{fragments/layout :: layout(~{::section#content}, #{user.title})}">
<section id="content">
<div class="content">

  <div class="page-header">
    <h2 th:text="#{user.title}">Users</h2>
    <div class="page-actions">
      <a th:href="@{/export/users/excel}" class="btn btn-outline export-btn">📊 <span th:text="#{export.excel}">Excel</span></a>
      <a th:href="@{/export/users/pdf}"   class="btn btn-outline export-btn">📄 <span th:text="#{export.pdf}">PDF</span></a>
      <a th:href="@{/users/new}" class="btn btn-primary"
         sec:authorize="hasAuthority('MANAGE_USERS')">
        + <span th:text="#{user.new}">Add User</span>
      </a>
    </div>
  </div>

  <!-- Search -->
  <form th:action="@{/users}" method="get" class="search-bar" style="margin-bottom:16px;">
    <input type="text" name="search" th:value="${search}"
           th:placeholder="#{common.search}" autocomplete="off">
    <button type="submit" class="btn btn-outline" th:text="#{common.search}">Search</button>
    <a th:if="${search != ''}" th:href="@{/users}" class="btn btn-outline" th:text="#{common.clear}">Clear</a>
  </form>

  <div th:if="${successMsg}" class="alert alert-success" th:text="${successMsg}"></div>

  <div class="card">
    <div th:if="${usersPage.isEmpty()}" class="empty-state">No users found.</div>
    <table class="table" th:if="${!usersPage.isEmpty()}">
      <thead><tr>
        <th th:text="#{user.name}">Name</th>
        <th th:text="#{user.email}">Email</th>
        <th th:text="#{user.branch}">Office</th>
        <th th:text="#{user.roles}">Roles</th>
        <th th:text="#{user.status}">Status</th>
        <th th:text="#{common.actions}">Actions</th>
      </tr></thead>
      <tbody>
        <tr th:each="u : ${usersPage.content}">
          <td style="font-weight:600;" th:text="${u.fullName}">Name</td>
          <td th:text="${u.email}">Email</td>
          <td th:text="${u.officeName}">Office</td>
          <td>
            <span th:each="role : ${u.roles}"
                  class="badge badge-blue"
                  th:text="${role.name.replace('ROLE_','')}">ROLE</span>
          </td>
          <td>
            <span class="badge" th:classappend="${u.enabled} ? 'badge-green' : 'badge-red'"
                  th:text="${u.enabled} ? #{user.active} : #{user.disabled}">Active</span>
          </td>
          <td class="action-btns">
            <a th:href="@{/users/{id}(id=${u.id})}" class="btn btn-sm btn-outline"
               sec:authorize="hasAuthority('MANAGE_USERS')" th:text="#{event.view}">View</a>
            <form th:action="@{/users/{id}/toggle(id=${u.id})}" method="post" style="display:inline">
              <button type="submit" class="btn btn-sm btn-outline"
                      sec:authorize="hasAuthority('MANAGE_USERS')"
                      th:text="${u.enabled} ? #{user.disable} : #{user.enable}">Toggle</button>
            </form>
          </td>
        </tr>
      </tbody>
    </table>

    <!-- Pagination -->
    <div th:replace="~{fragments/pagination :: pagination(${usersPage}, '/users', 'search=' + ${search})}"></div>
  </div>

</div>
</section>
</div>
</body>
</html>
