<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head><title>Edit Profile</title></head>
<body>
<div th:replace="~{fragments/layout :: layout(~{::section#content}, #{user.editProfile})}">
<section id="content">
<div class="content">

  <div class="page-header">
    <h2 th:text="#{user.editProfile}">Edit Profile</h2>
    <a th:href="@{/users/{id}(id=${userDto.id})}" class="btn btn-outline">← <span th:text="#{common.back}">Back</span></a>
  </div>

  <div class="card" style="max-width:680px;">
    <form th:action="@{/users/{id}/edit(id=${userDto.id})}" th:object="${userDto}"
          method="post" class="auth-form">

      <!-- Name row -->
      <div class="form-row">
        <div class="form-group">
          <label th:text="#{auth.register.firstName}">First Name</label>
          <input type="text" th:field="*{firstName}" class="form-control" required>
        </div>
        <div class="form-group">
          <label th:text="#{auth.register.lastName}">Last Name</label>
          <input type="text" th:field="*{lastName}" class="form-control" required>
        </div>
      </div>

      <!-- Title -->
      <div class="form-group">
        <label th:text="#{auth.register.title2}">Title / Position</label>
        <input type="text" th:field="*{title}" class="form-control"
               th:placeholder="#{user.title.placeholder}">
      </div>

      <!-- Phone -->
      <div class="form-group">
        <label th:text="#{user.phone}">Phone</label>
        <input type="text" th:field="*{phoneNumber}" class="form-control">
      </div>

      <!-- Bio -->
      <div class="form-group">
        <label th:text="#{user.bio}">Bio</label>
        <textarea th:field="*{bio}" class="form-control" rows="4"
                  th:placeholder="#{user.bio.placeholder}"></textarea>
        <small class="text-muted" th:text="#{user.bio.hint}">Optional — background, ministry, experience</small>
      </div>

      <!-- Profile picture URL -->
      <div class="form-group">
        <label th:text="#{user.profilePicture}">Profile Picture URL</label>
        <input type="url" th:field="*{profilePicture}" class="form-control"
               th:placeholder="#{user.profilePicture.placeholder}">
        <small class="text-muted" th:text="#{user.profilePicture.hint}">Link to a photo (e.g. from Google Drive or Gravatar)</small>
      </div>

      <!-- Social links -->
      <div class="form-row">
        <div class="form-group">
          <label th:text="#{user.linkedin}">LinkedIn</label>
          <input type="url" th:field="*{linkedinUrl}" class="form-control"
                 placeholder="https://linkedin.com/in/…">
        </div>
        <div class="form-group">
          <label th:text="#{user.website}">Website</label>
          <input type="url" th:field="*{websiteUrl}" class="form-control"
                 placeholder="https://…">
        </div>
      </div>

      <div class="form-actions">
        <button type="submit" class="btn btn-primary" th:text="#{common.save}">Save</button>
        <a th:href="@{/users/{id}(id=${userDto.id})}" class="btn btn-outline"
           th:text="#{common.cancel}">Cancel</a>
      </div>
    </form>
  </div>

</div>
</section>
</div>
</body>
</html>
