<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head><title>User</title></head>
<body>
<div th:replace="~{fragments/layout :: layout(~{::section#content}, #{user.info})}">
<section id="content">
<div class="content">
  <div class="page-header">
    <h2 th:text="${user.firstName + ' ' + user.lastName}">User</h2>
    <a th:href="@{/users}" class="btn btn-outline">← <span th:text="#{common.back}">Back</span></a>
  </div>
  <div th:if="${successMsg}" class="alert alert-success" th:text="${successMsg}"></div>

  <div class="dashboard-grid">
    <!-- Info -->
    <div class="card">
      <h3 class="card-title" th:text="#{user.info}">Info</h3>
      <div class="detail-row">
        <span class="detail-label" th:text="#{user.email}">Email</span>
        <span th:text="${user.email}">—</span>
      </div>
      <div class="detail-row">
        <span class="detail-label" th:text="#{user.branch}">Branch</span>
        <span th:text="${user.branch ?: '—'}">—</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Title</span>
        <span th:text="${user.title ?: '—'}">—</span>
      </div>
      <div class="detail-row">
        <span class="detail-label" th:text="#{user.status}">Status</span>
        <span class="badge" th:classappend="${user.enabled}?'badge-green':'badge-red'"
              th:text="${user.enabled}?#{user.active}:#{user.disabled}">Active</span>
      </div>
    </div>

    <!-- Role management -->
    <div class="card" sec:authorize="hasAuthority('MANAGE_ROLES')">
      <h3 class="card-title" th:text="#{user.roles}">Roles</h3>
      <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px;">
        <span th:each="r : ${user.roles}" class="badge badge-blue">
          <span th:text="${r.name.replace('ROLE_','')}">R</span>
          <form th:action="@{/users/{id}/role/remove(id=${user.id})}" method="post" style="display:inline">
            <input type="hidden" name="roleId" th:value="${r.id}">
            <button type="submit" style="background:none;border:none;color:#1e40af;cursor:pointer;padding:0 2px;font-size:11px;">✕</button>
          </form>
        </span>
        <span th:if="${#sets.isEmpty(user.roles)}" class="text-muted" th:text="#{common.none}">None</span>
      </div>
      <form th:action="@{/users/{id}/role/add(id=${user.id})}" method="post" class="form-inline">
        <select name="roleId" class="form-control" style="flex:1;">
          <option value="" th:text="#{user.role.add}">Add Role</option>
          <option th:each="r : ${allRoles}"
                  th:if="${not user.roles.contains(r)}"
                  th:value="${r.id}"
                  th:text="${r.name.replace('ROLE_','')}">Role</option>
        </select>
        <button type="submit" class="btn btn-primary" th:text="#{common.save}">Add</button>
      </form>
    </div>
  </div>
</div>
</section>
</div>
</body>
</html>
