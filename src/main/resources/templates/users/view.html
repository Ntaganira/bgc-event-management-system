<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
  <title>User</title>
</head>

<body>
  <div th:replace="~{fragments/layout :: layout(~{::section#content}, #{user.info})}">
    <section id="content">
      <div class="content">

        <div class="page-header">
          <h2 th:text="${user.firstName + ' ' + user.lastName}">User</h2>
          <div class="page-actions">
            <a th:href="@{/users}" class="btn btn-outline">← <span th:text="#{common.back}">Back</span></a>
            <a th:href="@{/users/{id}/edit(id=${user.id})}" class="btn btn-outline"
              sec:authorize="hasAuthority('MANAGE_USERS')" th:text="#{common.edit}">Edit Profile</a>
          </div>
        </div>

        <div th:if="${successMsg}" class="alert alert-success" th:text="${successMsg}"></div>
        <div th:if="${errorMsg}" class="alert alert-danger" th:text="${errorMsg}"></div>

        <div class="user-view-grid">

          <!-- ── Profile card ── -->
          <div class="uv-profile-card">
            <!-- Avatar -->
            <div class="uv-avatar-wrap">
              <img th:if="${user.profilePicture != null and !user.profilePicture.isEmpty()}"
                th:src="${user.profilePicture}" class="uv-avatar-img" alt="Profile photo">
              <div th:if="${user.profilePicture == null or user.profilePicture.isEmpty()}" class="uv-avatar-initials"
                th:text="${#strings.substring(user.firstName,0,1) + #strings.substring(user.lastName,0,1)}">JD</div>
            </div>
            <div class="uv-name" th:text="${user.firstName + ' ' + user.lastName}">Name</div>
            <div class="uv-title" th:if="${user.title}" th:text="${user.title}">Pastor</div>
            <div class="uv-office" th:text="${user.officeName}">Office</div>

            <!-- Status badge -->
            <div style="margin-top:10px;">
              <span class="badge" th:classappend="${user.enabled}?'badge-green':'badge-red'"
                th:text="${user.enabled}?#{user.active}:#{user.disabled}">Active</span>
            </div>

            <!-- Social links -->
            <div class="uv-links" th:if="${user.linkedinUrl != null or user.websiteUrl != null}">
              <a th:if="${user.linkedinUrl}" th:href="${user.linkedinUrl}" target="_blank" class="uv-link-btn">💼
                LinkedIn</a>
              <a th:if="${user.websiteUrl}" th:href="${user.websiteUrl}" target="_blank" class="uv-link-btn">🌐
                Website</a>
            </div>
            <!-- QR Code — attendance identifier -->
            <div class="uv-qr-wrap">
              <div class="uv-qr-label" th:text="#{user.qr.title}">Attendance QR</div>
              <img th:src="@{/qr/user/{id}(id=${user.id})}" alt="User QR Code" class="uv-qr-img"
                title="Scan at events for attendance check-in">
              <div class="uv-qr-code" th:text="${user.userCode}">BGC-XXXXXXXX</div>
              <small class="uv-qr-hint" th:text="#{user.qr.hint}">Scan at events for check-in</small>
            </div>
          </div>

          <!-- ── Right column ── -->
          <div class="uv-right">

            <!-- Bio -->
            <div class="card" th:if="${user.bio != null and !user.bio.isEmpty()}">
              <h3 class="card-title" th:text="#{user.bio}">Bio</h3>
              <p class="uv-bio" th:text="${user.bio}">—</p>
            </div>

            <!-- Contact & details -->
            <div class="card">
              <h3 class="card-title" th:text="#{user.info}">Info</h3>
              <div class="detail-row">
                <span class="detail-label" th:text="#{user.email}">Email</span>
                <span th:text="${user.email}">—</span>
              </div>
              <div class="detail-row" th:if="${user.phoneNumber}">
                <span class="detail-label" th:text="#{user.phone}">Phone</span>
                <span th:text="${user.phoneNumber}">—</span>
              </div>
              <div class="detail-row" th:if="${user.arrivalDate}">
                <span class="detail-label" th:text="#{user.arrivalDate}">Arrival</span>
                <span th:text="${#temporals.format(user.arrivalDate,'dd MMM yyyy')}">—</span>
              </div>
              <div class="detail-row" th:if="${user.returnDate}">
                <span class="detail-label" th:text="#{user.returnDate}">Return</span>
                <span th:text="${#temporals.format(user.returnDate,'dd MMM yyyy')}">—</span>
              </div>
              <div class="detail-row" th:if="${user.createdAt}">
                <span class="detail-label" th:text="#{user.joined}">Joined</span>
                <span th:text="${#temporals.format(user.createdAt,'dd MMM yyyy')}">—</span>
              </div>
            </div>

            <!-- Role management -->
            <div class="card" sec:authorize="hasAuthority('MANAGE_ROLES')">
              <h3 class="card-title" th:text="#{user.roles}">Roles</h3>
              <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px;">
                <span th:each="r : ${user.roles}" class="badge badge-blue">
                  <span th:text="${r.name.replace('ROLE_','')}">R</span>
                  <form th:action="@{/users/{id}/role/remove(id=${user.id})}" method="post" style="display:inline">
                    <input type="hidden" name="roleId" th:value="${r.id}">
                    <button type="submit"
                      style="background:none;border:none;color:#1e40af;cursor:pointer;padding:0 2px;font-size:11px;">✕</button>
                  </form>
                </span>
                <span th:if="${#sets.isEmpty(user.roles)}" class="text-muted" th:text="#{common.none}">None</span>
              </div>
              <form th:action="@{/users/{id}/role/add(id=${user.id})}" method="post" class="form-inline">
                <select name="roleId" class="form-control" style="flex:1;">
                  <option value="" th:text="#{user.role.add}">Add Role</option>
                  <option th:each="r : ${allRoles}" th:if="${not user.roles.contains(r)}" th:value="${r.id}"
                    th:text="${r.name.replace('ROLE_','')}">Role</option>
                </select>
                <button type="submit" class="btn btn-primary" th:text="#{common.save}">Add</button>
              </form>
            </div>

          </div>
        </div>

      </div>
    </section>
  </div>
</body>

</html>
