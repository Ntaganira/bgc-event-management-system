<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:fragment="layout(content, pageTitle)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle} + ' | BGC Event'">BGC Event</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.css" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>

<!-- ═══ NAV PROGRESS BAR (top line, fires on every link click) ═══ -->
<div id="nav-loader"></div>

<!-- ═══ PAGE SKELETON OVERLAY (dismissed on DOMContentLoaded) ════ -->
<div id="page-skeleton" aria-hidden="true">
  <!-- Fake topbar -->
  <div class="sk-topbar">
    <span class="skeleton skeleton-w25" style="height:28px;border-radius:6px;"></span>
    <span style="flex:1"></span>
    <span class="skeleton skeleton-avatar"></span>
    <span class="skeleton skeleton-w25" style="height:14px;"></span>
  </div>
  <!-- Fake body -->
  <div class="sk-body">
    <!-- Fake sidebar -->
    <div class="sk-sidebar">
      <span class="skeleton skeleton-w75" style="height:16px;"></span>
      <span class="skeleton skeleton-w100" style="height:36px;border-radius:8px;"></span>
      <span class="skeleton skeleton-w100" style="height:36px;border-radius:8px;"></span>
      <span class="skeleton skeleton-w100" style="height:36px;border-radius:8px;"></span>
      <span class="skeleton skeleton-w60" style="height:14px;margin-top:8px;"></span>
      <span class="skeleton skeleton-w100" style="height:36px;border-radius:8px;"></span>
      <span class="skeleton skeleton-w100" style="height:36px;border-radius:8px;"></span>
    </div>
    <!-- Fake content -->
    <div class="sk-content">
      <!-- Fake stat cards -->
      <div class="stats-grid">
        <div class="skeleton-stat-card">
          <span class="skeleton sk-icon"></span>
          <div class="sk-info">
            <span class="skeleton skeleton-title"></span>
            <span class="skeleton skeleton-text skeleton-w60"></span>
          </div>
        </div>
        <div class="skeleton-stat-card">
          <span class="skeleton sk-icon"></span>
          <div class="sk-info">
            <span class="skeleton skeleton-title"></span>
            <span class="skeleton skeleton-text skeleton-w60"></span>
          </div>
        </div>
        <div class="skeleton-stat-card">
          <span class="skeleton sk-icon"></span>
          <div class="sk-info">
            <span class="skeleton skeleton-title"></span>
            <span class="skeleton skeleton-text skeleton-w60"></span>
          </div>
        </div>
        <div class="skeleton-stat-card">
          <span class="skeleton sk-icon"></span>
          <div class="sk-info">
            <span class="skeleton skeleton-title"></span>
            <span class="skeleton skeleton-text skeleton-w60"></span>
          </div>
        </div>
      </div>
      <!-- Fake card with table rows -->
      <div class="card" style="padding:20px;">
        <span class="skeleton skeleton-title skeleton-w40"></span>
        <div class="skeleton-row">
          <span class="skeleton skeleton-w25" style="height:14px;"></span>
          <span class="skeleton skeleton-w40" style="height:14px;"></span>
          <span class="skeleton skeleton-w25" style="height:14px;"></span>
          <span class="skeleton skeleton-badge"></span>
        </div>
        <div class="skeleton-row">
          <span class="skeleton skeleton-w40" style="height:14px;"></span>
          <span class="skeleton skeleton-w25" style="height:14px;"></span>
          <span class="skeleton skeleton-w40" style="height:14px;"></span>
          <span class="skeleton skeleton-badge"></span>
        </div>
        <div class="skeleton-row">
          <span class="skeleton skeleton-w25" style="height:14px;"></span>
          <span class="skeleton skeleton-w60" style="height:14px;"></span>
          <span class="skeleton skeleton-w25" style="height:14px;"></span>
          <span class="skeleton skeleton-badge"></span>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="app-wrapper">

    <!-- ═══ SIDEBAR ═══ -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-logo">
            <div class="logo-icon">
              <img class="logo-img" th:src="@{/images/bcc_logo.png}" alt="BCC Logo" onerror="this.style.display='none'" />
            </div>
            <span class="logo-text" th:text="#{app.name}">BGC Event</span>
        </div>

        <nav class="nav">
            <!-- Main -->
            <div class="nav-section-label" th:text="#{nav.main}">Main</div>
            <a th:href="@{/dashboard}" class="nav-item">
                <span class="nav-icon"><i class="fas fa-home" style="color: #ffffff;"></i></span>
                <span class="nav-label" th:text="#{nav.dashboard}">Dashboard</span>
            </a>

            <!-- Events -->
            <div class="nav-section-label" th:text="#{nav.events}">Events</div>
            <a th:href="@{/events/calendar}" class="nav-item" sec:authorize="hasAuthority('VIEW_EVENT')">
                <span class="nav-icon"><i class="fas fa-calendar-alt" style="color: white;"></i></span>
                <span class="nav-label" th:text="#{nav.calendar}">Calendar</span>
            </a>
            <a th:href="@{/events}" class="nav-item" sec:authorize="hasAuthority('VIEW_EVENT')">
                <span class="nav-icon"><i class="fas fa-crosshairs" style="color: white;"></i></span>
                <span class="nav-label" th:text="#{nav.events}">Events</span>
            </a>
            <a th:href="@{/attendance}" class="nav-item" sec:authorize="hasAuthority('MARK_ATTENDANCE')">
                <span class="nav-icon"><i class="fas fa-check-circle" style="color: white;"></i> </span>
                <span class="nav-label" th:text="#{nav.attendance}">Attendance</span>
            </a>
            <a th:href="@{/agenda}"
               class="nav-item"
               >
                <span class="nav-icon"><i class="fas fa-calendar-alt" style="color: white;"></i></span>
                <span class="nav-label" th:text="#{nav.agenda}">Agenda</span>
            </a>
            <!-- ── BCC Offices (top-level section) ── -->
            <div class="nav-section-label"
                 sec:authorize="hasAuthority('MANAGE_OFFICES')"
                 th:text="#{nav.offices}">BCC Offices</div>
            <a th:href="@{/offices}" class="nav-item" sec:authorize="hasAuthority('MANAGE_OFFICES')">
                <span class="nav-icon"><i class="fas fa-building" style="color: white;"></i></span>
                <span class="nav-label" th:text="#{nav.offices}">BCC Offices</span>
            </a>
            
            <!-- Administration -->
            <div class="nav-section-label"
                 sec:authorize="hasAnyAuthority('VIEW_USERS','MANAGE_ROLES','VIEW_AUDIT_LOGS')"
                 th:text="#{nav.administration}">Administration</div>
            <a th:href="@{/users}" class="nav-item" sec:authorize="hasAuthority('VIEW_USERS')">
                <span class="nav-icon"><i class="fas fa-users" style="color: white;"></i> </span>
                <span class="nav-label" th:text="#{nav.users}">Users</span>
            </a>
            <a th:href="@{/roles}" class="nav-item" sec:authorize="hasAuthority('MANAGE_ROLES')">
                <span class="nav-icon"><i class="fas fa-shield-alt" style="color: white;"></i></span>
                <span class="nav-label" th:text="#{nav.roles}">Roles &amp; Permissions</span>
            </a>
            <a th:href="@{/audit}" class="nav-item" sec:authorize="hasAuthority('VIEW_AUDIT_LOGS')">
                <span class="nav-icon"><i class="fas fa-folder-open" style="color: white;"></i></span>
                <span class="nav-label" th:text="#{nav.audit}">Audit Logs</span>
            </a>
        </nav>

        <!-- Sidebar bottom: language switcher + logout -->
        <div class="sidebar-bottom">
            <div class="lang-switcher">
                <a th:href="@{''(lang=en)}"
                   th:classappend="${#locale.language == 'en'} ? ' active'"
                   class="lang-btn">EN</a>
                <span class="lang-sep">|</span>
                <a th:href="@{''(lang=fr)}"
                   th:classappend="${#locale.language == 'fr'} ? ' active'"
                   class="lang-btn">FR</a>
            </div>
            <a th:href="@{/logout}" class="nav-item">
                <span class="nav-icon"><i class="fas fa-power-off" style="color: white;"></i></span>
                <span class="nav-label" th:text="#{nav.logout}">Logout</span>
            </a>
        </div>
    </aside>

    <!-- ═══ MAIN ═══ -->
    <div class="main">
        <header class="topbar">
            <button class="sidebar-toggle" onclick="toggleSidebar()">☰</button>
            <h1 class="topbar-title" th:text="${pageTitle}">Page</h1>
            <div class="topbar-spacer"></div>
            <div class="topbar-user">
                <div class="avatar"
                     th:text="${#strings.substring(#authentication.name, 0, 1).toUpperCase()}">A</div>
                <span class="user-name" sec:authentication="name">user</span>
            </div>
        </header>

        <!-- Flash messages -->
        <div th:if="${successMsg}" class="flash flash-success" th:text="${successMsg}"></div>
        <div th:if="${errorMsg}"   class="flash flash-error"   th:text="${errorMsg}"></div>

        <div class="main-content">
            <!-- Page content -->
            <div th:replace="${content}"></div>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
