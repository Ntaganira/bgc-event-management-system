<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
</head>
<body>
    <div th:fragment="header" class="top-bar">
        <div>
            <h1 class="page-title" th:text="${pageTitle} ?: 'Dashboard'">Dashboard</h1>
            <p class="text-muted" th:text="${pageSubtitle} ?: _">Welcome back!</p>
        </div>
        <div class="top-actions">
            <!-- Notifications -->
            <button class="action-btn notification-badge" id="notificationBtn">
                <i class="fas fa-bell"></i>
                <span class="badge-count" id="notificationCount">3</span>
            </button>
            
            <!-- Refresh Button -->
            <button class="action-btn" id="refreshBtn" onclick="location.reload()">
                <i class="fas fa-sync-alt"></i>
            </button>
            
            <!-- User Menu -->
            <div class="dropdown">
                <button class="action-btn" data-bs-toggle="dropdown">
                    <i class="fas fa-user-circle"></i>
                </button>
                <ul class="dropdown-menu dropdown-menu-end">
                    <li><a class="dropdown-item" href="/profile">
                        <i class="fas fa-user me-2"></i>Profile
                    </a></li>
                    <li><a class="dropdown-item" href="/settings">
                        <i class="fas fa-cog me-2"></i>Settings
                    </a></li>
                    <li><hr class="dropdown-divider"></li>
                    <li><a class="dropdown-item text-danger" href="/logout">
                        <i class="fas fa-sign-out-alt me-2"></i>Logout
                    </a></li>
                </ul>
            </div>
        </div>
    </div>
</body>
</html>
