spring.application.name=Event System

# ---- Active Profile ----
# dev  → H2 in-memory (local development)
# prod → PostgreSQL (Render / production)
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# ---- JPA ----
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# ---- Flyway ----
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# ---- Server ----
server.port=${PORT:8080}
server.error.whitelabel.enabled=false

# ---- Thymeleaf ----
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# ---- Mail (SMTP) ----
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:ntaganira71@gmail.com}
spring.mail.password=${MAIL_PASSWORD:bgro nbbb zekk buov}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ---- App custom ----
app.base-url=${APP_BASE_URL:http://localhost:8080}
app.qr.output-dir=qr-codes

# ---- Logging ----
logging.level.com.bgc=DEBUG
logging.level.org.springframework.security=WARN

# ---- i18n ----
spring.messages.basename=i18n/messages
spring.messages.encoding=UTF-8
spring.messages.fallback-to-system-locale=false
