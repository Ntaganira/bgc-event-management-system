spring.application.name=bgc-event-management-system

# application.properties
# Project    : BGC EVENT
# Date       : 2026. 02. 21.

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/bgc_event_db
spring.datasource.username=bgc_user
spring.datasource.password=bgc_password
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=20

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# Redis Configuration
spring.redis.host=localhost
spring.redis.port=6379
spring.cache.type=redis
spring.cache.redis.time-to-live=600000

# JWT Configuration
app.jwt.secret=mySuperSecretKeyForJWTTokenGenerationAndValidation2026
app.jwt.expiration=86400000
app.jwt.refresh-expiration=604800000

# Mail Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=notifications@bgc.event
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Logging
logging.level.com.bgc.event=DEBUG
logging.level.org.springframework.security=INFO
logging.file.name=logs/bgc-event.log
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n