# ============================================================================
# BGC EVENTS MANAGEMENT SYSTEM - APPLICATION CONFIGURATION
# ============================================================================

spring.application.name=bgc-event-management-system

# ----------------------------------------------------------------------------
# SERVER CONFIGURATION
# ----------------------------------------------------------------------------
server.port=8080
server.error.include-message=always
server.error.include-binding-errors=always
server.servlet.context-path=/
server.compression.enabled=true
server.compression.mime-types=text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json

spring.main.web-application-type=none

# ----------------------------------------------------------------------------
# SPRING PROFILES (Active profile can be set via environment variable)
# ----------------------------------------------------------------------------
# Use: -Dspring.profiles.active=dev (development)
# Use: -Dspring.profiles.active=docker (Docker)
# Use: -Dspring.profiles.active=prod (production)
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# ----------------------------------------------------------------------------
# DATABASE CONFIGURATION (TimescaleDB/PostgreSQL)
# ----------------------------------------------------------------------------
# For local development (default)
spring.datasource.url=jdbc:postgresql://localhost:5432/bgc_event_db
spring.datasource.username=bgc_user
spring.datasource.password=bgc_password

# For Docker (overridden by environment variables)
# spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/bgc_event_db}
# spring.datasource.username=${SPRING_DATASOURCE_USERNAME:bgc_user}
# spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:bgc_password}

spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.pool-name=BgcEventHikariCP

# ----------------------------------------------------------------------------
# JPA / HIBERNATE CONFIGURATION
# ----------------------------------------------------------------------------
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true
spring.jpa.properties.hibernate.generate_statistics=false
spring.jpa.open-in-view=false

# ----------------------------------------------------------------------------
# FLYWAY DATABASE MIGRATIONS
# ----------------------------------------------------------------------------
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.locations=classpath:db/migration
spring.flyway.out-of-order=false
spring.flyway.validate-on-migrate=true
spring.flyway.clean-disabled=true
spring.flyway.table=flyway_schema_history

# ----------------------------------------------------------------------------
# REDIS CACHE CONFIGURATION
# ----------------------------------------------------------------------------
spring.redis.host=${SPRING_REDIS_HOST:localhost}
spring.redis.port=${SPRING_REDIS_PORT:6379}
spring.redis.password=${SPRING_REDIS_PASSWORD:}
spring.redis.timeout=2000ms
spring.redis.lettuce.pool.max-active=8
spring.redis.lettuce.pool.max-idle=8
spring.redis.lettuce.pool.min-idle=2
spring.redis.lettuce.pool.max-wait=-1ms

# Cache Configuration
spring.cache.type=redis
spring.cache.redis.time-to-live=600000
spring.cache.redis.cache-null-values=false
spring.cache.redis.use-key-prefix=true
spring.cache.redis.key-prefix=bgc:

# ----------------------------------------------------------------------------
# JWT AUTHENTICATION
# ----------------------------------------------------------------------------
app.jwt.secret=${JWT_SECRET:mySuperSecretKeyForJWTTokenGenerationAndValidation2026}
app.jwt.expiration=${JWT_EXPIRATION:86400000}
app.jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}
app.jwt.token-prefix=Bearer
app.jwt.header-string=Authorization

# ----------------------------------------------------------------------------
# APPLICATION SPECIFIC CONFIGURATION
# ----------------------------------------------------------------------------
app.base-url=${APP_BASE_URL:http://localhost:8080}
app.name=BGC Events Management System
app.version=1.0.0
app.description=Event management platform with QR check-in and analytics

# QR Code Configuration
app.qr-code.size=300
app.qr-code.format=PNG
app.qr-code.correction-level=H

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=${user.dir}/uploads

# ----------------------------------------------------------------------------
# MAIL CONFIGURATION (Development with MailHog)
# ----------------------------------------------------------------------------
spring.mail.host=${SPRING_MAIL_HOST:localhost}
spring.mail.port=${SPRING_MAIL_PORT:1025}
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# For Gmail (production)
# spring.mail.host=smtp.gmail.com
# spring.mail.port=587
# spring.mail.username=your-email@gmail.com
# spring.mail.password=your-app-password
# spring.mail.properties.mail.smtp.auth=true
# spring.mail.properties.mail.smtp.starttls.enable=true

# ----------------------------------------------------------------------------
# LOGGING CONFIGURATION
# ----------------------------------------------------------------------------
logging.level.com.bgc.event=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=INFO
logging.level.org.hibernate=WARN
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# File Logging
logging.file.name=logs/bgc-event.log
logging.file.max-size=10MB
logging.file.max-history=30
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} %clr(%-5level) %clr(${PID:-}){magenta} --- %clr([%thread]){blue} %clr(%logger{36}){cyan} %clr(:){red} %msg%n

# ----------------------------------------------------------------------------
# MANAGEMENT ENDPOINTS (ACTUATOR)
# ----------------------------------------------------------------------------
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.endpoint.health.show-components=always
management.health.db.enabled=true
management.health.redis.enabled=true
management.health.diskspace.enabled=true
management.metrics.export.prometheus.enabled=true

# ----------------------------------------------------------------------------
# THYMELEAF TEMPLATING
# ----------------------------------------------------------------------------
spring.thymeleaf.cache=false
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.servlet.content-type=text/html
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.check-template-location=true

# ----------------------------------------------------------------------------
# SECURITY CONFIGURATION
# ----------------------------------------------------------------------------
# CSRF Protection (enabled in production)
security.csrf.enabled=false
security.cors.allowed-origins=http://localhost:8080,http://localhost:3000
security.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
security.cors.allowed-headers=*
security.cors.allow-credentials=true

# ----------------------------------------------------------------------------
# TASK EXECUTION (Async)
# ----------------------------------------------------------------------------
spring.task.execution.pool.core-size=2
spring.task.execution.pool.max-size=5
spring.task.execution.pool.queue-capacity=100
spring.task.execution.thread-name-prefix=bgc-task-

# ----------------------------------------------------------------------------
# TIMEZONE
# ----------------------------------------------------------------------------
spring.jackson.time-zone=Asia/Manila
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss